<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Production Dashboard</title>
    <style>
        body { margin: 0; padding: 0; background-color: #0b0f19; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: sans-serif; }
        .container { width: 100%; max-width: 1200px; padding: 20px; text-align: center; }
        img { width: 100%; height: auto; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { color: #ffffff; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Production Dashboard Live View</h2>
        <!-- The ID lets JavaScript target the image, and ?t=timestamp tricks the cache -->
        <img id="dashboard-img" src="screenshot.jpg?t=0" alt="Production Status">
    </div>

    <script>
        // Update the image source URL every 60 seconds with a unique timestamp to force a reload.
        setInterval(function() {
            var img = document.getElementById('dashboard-img');
            // Adding '?t=' + the current time makes the browser treat it as a new file request every time.
            img.src = 'screenshot.jpg?t=' + new Date().getTime();
            console.log("Dashboard view refreshed.");
        }, 60000); // 60000 milliseconds = 60 seconds.
    </script>
</body>
</html>
