<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Production Dashboard</title>
    <style>
        body { margin: 0; padding: 0; background-color: #0b0f19; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: sans-serif; }
        .container { width: 100%; max-width: 1200px; padding: 20px; text-align: center; }
        img { width: 100%; height: auto; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { color: #ffffff; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Production Dashboard Live View</h2>
        <!-- Loads the live image stream -->
        <img id="live-img" src="" alt="Production Status Loading...">
    </div>

    <script>
        function refreshImage() {
            // Re-fetches the live screenshot image link directly
            var img = document.getElementById('live-img');
            img.src = 'https://i.imgur.com/YOUR_IMAGE_ID.jpg?t=' + new Date().getTime();
        }

        // Run on load
        refreshImage();

        // Refresh image on screen automatically every 60 seconds
        setInterval(refreshImage, 60000);
    </script>
</body>
</html>
